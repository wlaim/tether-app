name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS (amd64)
        run: wails build -platform darwin/amd64

      - name: Rename amd64 binary
        run: mv build/bin/tether-app build/bin/tether-app-mac-intel

      - name: Build macOS (arm64 / Apple Silicon)
        run: wails build -platform darwin/arm64

      - name: Rename arm64 binary
        run: mv build/bin/tether-app build/bin/tether-app-mac-apple-silicon

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: tether-mac
          path: |
            build/bin/tether-app-mac-intel
            build/bin/tether-app-mac-apple-silicon
